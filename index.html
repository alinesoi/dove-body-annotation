<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confident Me - Appearance Ideals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3D6F;--teal:#45B5AA;--teal-light:#7EDDC3;
  --coral:#F47B6C;--coral-light:#F9A99F;
  --yellow:#F7DC6F;--mint:#B5ECD8;
  --dash:#B8D8D2;--text:#1B3D6F;--text-dim:#5A7A9E;--text-muted:#8BAAB8;
}
html,body{height:100%;font-family:'Nunito',sans-serif;overflow:hidden;background:#B5DFD3}

/* ═══ INTRO ═══ */
#intro{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:linear-gradient(145deg,#E8FBF4 0%,#FFF 35%,#FFF4CC 70%,#FDE8E5 100%);background-size:200% 200%;
  animation:gShift 6s ease infinite;transition:opacity .8s,transform .8s}
#intro.hidden{opacity:0;transform:scale(1.08);pointer-events:none}
@keyframes gShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.ib{display:inline-block;padding:6px 20px;background:var(--teal-light);border-radius:20px;font-size:11px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:2px;opacity:0;animation:pop .6s .3s cubic-bezier(.34,1.56,.64,1) forwards}
.it{font-family:'Fredoka';font-size:clamp(52px,9vw,90px);font-weight:700;color:var(--navy);margin:18px 0 6px;line-height:.95;letter-spacing:-2px;opacity:0;animation:pop .7s .6s cubic-bezier(.34,1.56,.64,1) forwards}
.is{font-family:'Fredoka';font-size:clamp(22px,3.5vw,32px);font-weight:600;color:var(--coral);opacity:0;animation:su .6s 1s ease-out forwards}
.ibtn{margin-top:40px;padding:18px 56px;background:var(--coral);color:#fff;border:none;border-radius:60px;font-family:'Fredoka';font-size:22px;font-weight:600;cursor:pointer;opacity:0;animation:pop .6s 1.4s cubic-bezier(.34,1.56,.64,1) forwards;box-shadow:0 8px 30px rgba(244,123,108,.4);transition:transform .2s;position:relative}
.ibtn:hover{transform:scale(1.06)}
.ibtn::after{content:'';position:absolute;inset:-3px;border-radius:63px;border:3px solid var(--coral-light);animation:pulse 2s 1.8s ease-out infinite}
.ideco{position:fixed;pointer-events:none;z-index:999;opacity:0}.ideco.on{animation:fdeco .8s ease-out forwards}
#conf{position:fixed;inset:0;z-index:9999;pointer-events:none}

/* ═══ GAME PAGE - Image Background Approach ═══ */
.game{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#B5DFD3;overflow:hidden;opacity:0;transform:translateY(20px)}
.game.on{opacity:1;transform:none;transition:all .9s cubic-bezier(.23,1,.32,1)}

.canvas{
  position:relative;
  width:min(100vw, 150vh);
  height:min(100vh, 66.67vw);
  background:url('images/mockup_bg_final.png') center/100% 100% no-repeat;
}

/* Overlays positioned with percentages on top of the mockup image */
.ov{position:absolute;cursor:pointer}

/* Home button - transparent overlay on mockup's Home btn */
.ov-home{left:1.3%;top:1.8%;width:5.5%;height:4%;border-radius:10px;z-index:10}
.ov-home:hover{background:rgba(69,181,170,.1)}

/* Progress number - positioned in the clean Progress card */
.ov-pnum{left:2%;top:48%;width:12%;height:10%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  font-family:'Fredoka';font-size:min(4vw,42px);font-weight:700;color:var(--navy);
  background:transparent;border-radius:0;cursor:default;z-index:2}
.ov-pnum .plbl{font-family:'Nunito';font-size:min(1vw,11px);font-weight:700;color:var(--text-dim)}
.ov-pnum .phint{font-family:'Nunito';font-size:min(0.7vw,9px);color:var(--teal);font-style:italic;font-weight:600}
.ov-pnum.bo{animation:cb .4s cubic-bezier(.34,1.56,.64,1)}

/* Annotation slots - GPT-4o vision detected positions */
.ov-slot{
  width:14.2%;height:7%;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;z-index:3;
}
.ov-slot.filled{
  background:rgba(255,255,255,.95);border:2px solid var(--teal-light);
  color:var(--navy);font-weight:700;font-size:min(1.2vw,13px);
  text-align:center;padding:4px 8px;
  animation:slotPop .5s cubic-bezier(.34,1.56,.64,1);
}
.ov-slot.filled:hover{transform:scale(1.05);border-color:var(--teal);box-shadow:0 4px 16px rgba(69,181,170,.2)}
.ov-slot .sub{font-size:min(0.8vw,9px);font-weight:600;color:var(--text-dim);margin-top:1px}

/* Left slots - GPT-4o detected: left=21.4%, y=23.1/36.4/51.0/66.8% */
.slot-0{left:21.4%;top:23.1%}
.slot-2{left:21.4%;top:36.4%}
.slot-4{left:21.4%;top:51%}
.slot-6{left:21.4%;top:66.8%}
/* Right slots - GPT-4o detected: left=65.2% */
.slot-1{left:65.2%;top:23.1%}
.slot-3{left:65.2%;top:36.4%}
.slot-5{left:65.2%;top:51%}
.slot-7{left:65.2%;top:66.8%}

/* Body hotspot zones - invisible, just capture clicks (no visible hover to avoid green rectangles) */
.ov-hs{border-radius:8px;z-index:4;cursor:pointer}
.ov-hs:hover{cursor:pointer}

/* Hotspot popup */
#hsPopup{position:absolute;z-index:20;background:#fff;border:2px solid var(--teal);border-radius:14px;padding:12px 14px;box-shadow:0 8px 28px rgba(27,61,111,.15);display:none;width:220px}
#hsPopup.active{display:block;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
#hsPopup h3{font-family:'Fredoka';font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
#hsPopup h3 span{color:var(--coral)}
.hs-row{display:flex;gap:5px}
.hs-row input{flex:1;padding:7px 10px;border:2px solid var(--dash);border-radius:10px;font-family:'Nunito';font-size:11px;color:var(--navy);outline:none;transition:border .2s}
.hs-row input:focus{border-color:var(--teal)}
.hs-row button{padding:7px 12px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-family:'Fredoka';font-size:12px;font-weight:600;cursor:pointer}
.hs-label{position:absolute;pointer-events:none;z-index:10;background:var(--navy);color:#fff;font-family:'Fredoka';font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;white-space:nowrap;opacity:0;transition:opacity .2s}

/* Input bar overlay - fills the golden bar's white interior */
.ov-input{
  left:26%;top:86%;width:48%;height:5%;z-index:10;
  display:flex;align-items:center;
  background:transparent;border:none;border-radius:28px;
  padding:0;
}
.ov-input input{
  flex:1;border:none;outline:none;font-family:'Nunito';font-size:2vw;font-weight:600;
  color:var(--navy);background:transparent;min-width:0;text-align:center;
}
.ov-input input::placeholder{color:#8BAAB8;font-weight:600}
.ov-input input.shake{animation:shake .5s}

/* Send button - GPT-4o: left=74%, top=83%, width=6%, height=8% */
.ov-send{
  left:74%;top:83%;width:5.5%;height:7%;z-index:11;
  border-radius:50%;background:transparent;color:transparent;border:none;
  font-size:min(1.6vw,18px);display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.ov-send:hover{transform:scale(1.1);background:rgba(244,123,108,.15)}
.ov-send:disabled{opacity:.4;cursor:not-allowed;transform:none}
.ov-send .sp{display:none;width:14px;height:14px;border:2px solid var(--coral);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
.ov-send.loading .arrow{display:none}
.ov-send.loading .sp{display:block}

/* Done button */
.ov-done{
  left:80.5%;top:83.5%;width:auto;height:auto;z-index:11;
  padding:6px 16px;background:var(--navy);color:#fff;border:none;border-radius:20px;
  font-family:'Fredoka';font-size:min(1.1vw,13px);font-weight:600;
  transition:all .2s;box-shadow:0 3px 10px rgba(27,61,111,.2);
}
.ov-done:hover{transform:scale(1.05)}

/* ═══ OVERLAYS ═══ */
#zoomOverlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(224,247,241,.95);backdrop-filter:blur(16px)}
#zoomOverlay.active{display:flex}
.zoom-inner{text-align:center;max-width:640px;width:100%;padding:40px}
.zq{font-family:'Fredoka';font-size:26px;font-weight:700;color:var(--navy);margin-bottom:20px;opacity:0;animation:su .5s .2s ease-out forwards}
.zq span{color:var(--coral)}
.zimages{display:flex;gap:16px;justify-content:center;margin-bottom:12px}
.zimg-card{flex:0 1 170px;padding:12px;background:#fff;border:3px solid var(--dash);border-radius:18px;cursor:pointer;transition:all .25s;opacity:0;text-align:center}
.zimg-card:hover{border-color:var(--teal);transform:translateY(-6px) scale(1.03);box-shadow:0 12px 30px rgba(69,181,170,.18)}
.zimg-card img{width:100%;aspect-ratio:1;border-radius:12px;object-fit:cover;display:block;margin-bottom:8px}
.zimg-label{font-family:'Fredoka';font-size:14px;font-weight:600;color:var(--navy)}

#idkOverlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(244,123,108,.08);backdrop-filter:blur(4px)}
#idkOverlay.active{display:flex}
.idk-content{text-align:center;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
.idk-x{font-size:120px;color:#E74C3C;line-height:1}
.idk-msg{font-family:'Fredoka';font-size:22px;color:var(--navy);margin-top:12px}

#doneOverlay{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(224,247,241,.95);backdrop-filter:blur(16px)}
#doneOverlay.active{display:flex}
.done-content{text-align:center;max-width:480px;padding:40px}
.done-emoji{font-size:80px;animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
.done-title{font-family:'Fredoka';font-size:34px;font-weight:700;color:var(--navy);margin:10px 0}
.done-count{font-family:'Fredoka';font-size:48px;font-weight:700;color:var(--coral)}
.done-label{font-size:13px;color:var(--text-dim);font-weight:700;margin-bottom:14px}
.done-traits{text-align:left;max-height:200px;overflow-y:auto;margin:12px 0}
.done-trait{padding:6px 12px;margin:4px 0;background:var(--mint);border:2px solid var(--teal-light);border-radius:10px;font-size:12px;font-weight:700;color:var(--navy)}
.done-trait .sub{font-size:10px;color:var(--text-dim)}
.done-back{padding:14px 40px;background:var(--coral);color:#fff;border:none;border-radius:50px;font-family:'Fredoka';font-size:18px;font-weight:600;cursor:pointer;box-shadow:0 6px 24px rgba(244,123,108,.3);transition:all .2s}
.done-back:hover{transform:scale(1.05)}

#toast{position:fixed;top:-80px;left:50%;transform:translateX(-50%);z-index:8000;padding:12px 28px;background:var(--navy);color:#fff;border-radius:18px;font-family:'Fredoka';font-size:16px;font-weight:600;box-shadow:0 10px 40px rgba(27,61,111,.3);display:flex;align-items:center;gap:8px;white-space:nowrap;transition:top .6s cubic-bezier(.34,1.56,.64,1)}
#toast.show{top:16px}

/* Keyframes */
@keyframes pop{0%{opacity:0;transform:scale(.5) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes su{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:none}}
@keyframes fdeco{0%{opacity:0;transform:scale(.4)}100%{opacity:.12;transform:scale(1)}}
@keyframes pulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.5);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes cb{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes slotPop{0%{opacity:0;transform:scale(.5)}60%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="ib">Dove Self-Esteem Project</div>
  <div class="it">Confident Me</div>
  <div class="is">Appearance Ideals</div>
  <button class="ibtn" onclick="startGame()">Let's Go!</button>
  <div class="ideco" style="top:10%;left:7%;font-family:Fredoka;font-weight:700;color:var(--teal-light);font-size:32px">+</div>
  <div class="ideco" style="top:16%;right:10%;font-family:Fredoka;font-weight:700;color:var(--coral);font-size:26px">+</div>
  <div class="ideco" style="bottom:20%;left:12%;width:22px;height:22px;border-radius:50%;border:3px solid var(--coral)"></div>
  <div class="ideco" style="top:28%;right:16%;width:14px;height:14px;border:2px solid var(--navy);transform:rotate(45deg)"></div>
  <div class="ideco" style="bottom:16%;right:8%;font-family:Fredoka;font-weight:700;color:var(--yellow);font-size:22px">+</div>
</div>

<canvas id="conf"></canvas>

<!-- GAME PAGE - Mockup image as background with interactive overlays -->
<div class="game" id="game">
  <div class="canvas" id="gameCanvas">

    <!-- Home button overlay -->
    <div class="ov ov-home" onclick="location.reload()"></div>

    <!-- Progress display - number + label + hint in one block -->
    <div class="ov ov-pnum" id="pNum">
      <span id="pCount">0</span>
      <span class="plbl">traits found</span>
      <span class="phint" id="pHint">Let's find some amazing traits!</span>
    </div>

    <!-- 8 annotation slot overlays -->
    <div class="ov ov-slot slot-0" data-slot="0"></div>
    <div class="ov ov-slot slot-1" data-slot="1"></div>
    <div class="ov ov-slot slot-2" data-slot="2"></div>
    <div class="ov ov-slot slot-3" data-slot="3"></div>
    <div class="ov ov-slot slot-4" data-slot="4"></div>
    <div class="ov ov-slot slot-5" data-slot="5"></div>
    <div class="ov ov-slot slot-6" data-slot="6"></div>
    <div class="ov ov-slot slot-7" data-slot="7"></div>

    <!-- Body hotspot zones - GPT-4o: body at x=39.6-63.8%, y=14.5-80.9% -->
    <div class="ov ov-hs" data-region="head" data-label="Head" style="left:43%;top:14.5%;width:16%;height:10%"></div>
    <div class="ov ov-hs" data-region="shoulders" data-label="Shoulders" style="left:38%;top:23%;width:26%;height:6%"></div>
    <div class="ov ov-hs" data-region="chest" data-label="Chest" style="left:42%;top:29%;width:18%;height:8%"></div>
    <div class="ov ov-hs" data-region="arms" data-label="Arms" style="left:37%;top:25%;width:6%;height:20%"></div>
    <div class="ov ov-hs" data-region="arms" data-label="Arms" style="left:59%;top:25%;width:6%;height:20%"></div>
    <div class="ov ov-hs" data-region="abs" data-label="Abs / Core" style="left:42%;top:37%;width:18%;height:11%"></div>
    <div class="ov ov-hs" data-region="hips" data-label="Hips / Waist" style="left:40%;top:48%;width:22%;height:7%"></div>
    <div class="ov ov-hs" data-region="legs" data-label="Legs" style="left:41%;top:55%;width:20%;height:18%"></div>
    <div class="ov ov-hs" data-region="feet" data-label="Feet" style="left:41%;top:73%;width:20%;height:8%"></div>

    <!-- Hotspot popup -->
    <div id="hsPopup"><h3>Add trait for <span id="hsRegionLabel">Head</span></h3><div class="hs-row"><input id="hsInput" placeholder="e.g., thick hair" onkeydown="if(event.key==='Enter')hsSubmit()"/><button onclick="hsSubmit()">Add</button></div></div>
    <div class="hs-label" id="hsLabel"></div>

    <!-- Input bar overlay - centered on the mockup's text area -->
    <div class="ov ov-input">
      <input id="inp" placeholder="What traits come to mind?" onkeydown="if(event.key==='Enter'){event.preventDefault();submitTrait()}"/>
    </div>
    <button class="ov ov-send" id="btnGo" onclick="submitTrait()"><span class="arrow">➤</span><span class="sp"></span></button>
    <button class="ov ov-done" onclick="showDone()">Done</button>
  </div>
</div>

<!-- OVERLAYS -->
<div id="zoomOverlay"><div class="zoom-inner" id="zoomInner"></div></div>
<div id="idkOverlay"><div class="idk-content"><div class="idk-x">✕</div><div class="idk-msg">Think harder! What comes to mind?</div></div></div>
<div id="doneOverlay"><div class="done-content" id="doneContent"></div></div>
<div id="toast"><span id="tE"></span><span id="tT"></span></div>

<script>
/* AUDIO */
let ac;
function initA(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)()}
function tone(f,d,t,v,dl){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=t||'sine';o.frequency.setValueAtTime(f,ac.currentTime+(dl||0));g.gain.setValueAtTime(v||.2,ac.currentTime+(dl||0));g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+(dl||0)+d);o.start(ac.currentTime+(dl||0));o.stop(ac.currentTime+(dl||0)+d)}
function sndPop(){tone(880,.1,'sine',.25);tone(440,.08,'sine',.15,.04)}
function sndDing(){tone(523,.25,'sine',.2);tone(659,.25,'sine',.18,.08)}
function sndSelect(){tone(440,.12,'sine',.2);tone(554,.12,'sine',.18,.06);tone(659,.2,'sine',.15,.12)}
function sndClick(){tone(600,.06,'sine',.15);tone(800,.06,'sine',.12,.03)}
function sndCeleb(){[523,659,784,1047].forEach((f,i)=>tone(f,.3,'triangle',.18,i*.1))}
function sndWhoosh(){if(!ac)return;const b=ac.createBuffer(1,ac.sampleRate*.25,ac.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.25;const s=ac.createBufferSource();s.buffer=b;const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(1200,ac.currentTime);f.frequency.exponentialRampToValueAtTime(200,ac.currentTime+.2);f.Q.value=2;const g=ac.createGain();g.gain.setValueAtTime(.25,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.25);s.connect(f);f.connect(g);g.connect(ac.destination);s.start();s.stop(ac.currentTime+.25)}
function sndErr(){tone(200,.3,'square',.15);tone(150,.3,'square',.1,.1)}

/* CONFETTI */
const cv=document.getElementById('conf'),cx=cv.getContext('2d');let cp=[],cr=false;
const clrs=['#F47B6C','#3EA66B','#F7DC6F','#7EDDC3','#1B3D6F','#FF87B2'];
function burst(x,y,n){cv.width=innerWidth;cv.height=innerHeight;for(let i=0;i<n;i++)cp.push({x,y,vx:(Math.random()-.5)*20,vy:(Math.random()-.8)*16,w:Math.random()*10+4,h:Math.random()*6+3,c:clrs[Math.random()*clrs.length|0],r:Math.random()*360,rv:(Math.random()-.5)*14,l:1,d:Math.random()*.008+.005});if(!cr)aniC()}
function aniC(){cr=true;cx.clearRect(0,0,cv.width,cv.height);cp=cp.filter(p=>p.l>0);cp.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.r+=p.rv;p.l-=p.d;p.vx*=.99;cx.save();cx.translate(p.x,p.y);cx.rotate(p.r*Math.PI/180);cx.globalAlpha=Math.min(p.l*2,1);cx.fillStyle=p.c;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore()});cp.length?requestAnimationFrame(aniC):cr=false}

/* MILESTONES */
const MS={3:{e:'⭐',t:'Great start!'},5:{e:'🔥',t:'On fire! 5!'},10:{e:'🎉',t:'Amazing! 10!'},15:{e:'🚀',t:'15 traits!'},20:{e:'💪',t:'Unstoppable!'}};
function checkMS(n){const m=MS[n];if(!m)return;document.getElementById('tE').textContent=m.e;document.getElementById('tT').textContent=m.t;const t=document.getElementById('toast');t.classList.add('show');sndCeleb();burst(innerWidth/2,innerHeight/3,90);setTimeout(()=>t.classList.remove('show'),3000)}

/* INTRO */
function startGame(){initA();sndWhoosh();document.querySelectorAll('.ideco').forEach(d=>d.classList.add('on'));document.getElementById('intro').classList.add('hidden');setTimeout(()=>{document.getElementById('intro').style.display='none';document.getElementById('game').classList.add('on');setTimeout(()=>sndPop(),500)},700)}

/* REGIONS & SLOT MAPPING */
const REGIONS={head:{s:[0,1]},face:{s:[0,1]},mouth:{s:[0,1]},shoulders:{s:[2,3]},chest:{s:[2,3]},arms:{s:[2,3]},abs:{s:[4,5]},hips:{s:[4,5]},legs:{s:[6,7]},feet:{s:[6,7]},full:{s:[4,5]}};
const slotData=new Array(8).fill(null);

function findSlot(region){
  const r=REGIONS[region]||REGIONS.full;
  for(const s of r.s)if(!slotData[s])return s;
  for(let i=0;i<8;i++)if(!slotData[i])return i;
  return r.s[0];
}

function fillSlot(idx,trait,detail){
  slotData[idx]={trait,detail};
  const el=document.querySelector(`.slot-${idx}`);
  el.className=`ov ov-slot slot-${idx} filled`;
  el.innerHTML=`<div>${trait}</div>${detail?`<div class="sub">${detail}</div>`:''}`;
}

function renderSlots(){
  for(let i=0;i<8;i++){
    const el=document.querySelector(`.slot-${i}`);
    if(slotData[i]){
      el.className=`ov ov-slot slot-${i} filled`;
      el.innerHTML=`<div>${slotData[i].trait}</div>${slotData[i].detail?`<div class="sub">${slotData[i].detail}</div>`:''}`;
    }else{
      el.className=`ov ov-slot slot-${i}`;
      el.innerHTML='';
    }
  }
}

/* API */
const AE='https://nesoi-resource.openai.azure.com';
const AK='89bry3528qMUbZnFK77ExyBjS7W02IbOFj35UwU6yjKTE0yiJRMCJQQJ99CCACHYHv6XJ3w3AAAAACOGJj4V';
const AV='2025-04-01-preview';
let traits=[],busy=false;

const IDK_RE=/^(idk|i\s*don'?t\s*know|no\s*idea|not\s*sure|nothing|none|no|nah|dunno|idc|whatever|i\s*give\s*up)$/i;
const SMILE_RE=/smile|smiling|grin|teeth|happy face/i;

async function submitTrait(){
  if(busy)return;
  const inp=document.getElementById('inp'),txt=inp.value.trim();
  if(!txt)return;
  if(IDK_RE.test(txt)){showIDK();inp.value='';return}
  if(SMILE_RE.test(txt)){inp.value='';showSmileZoom();return}

  busy=true;const btn=document.getElementById('btnGo');
  btn.disabled=true;btn.classList.add('loading');
  try{
    const r=await fetch(`${AE}/openai/deployments/gpt-5.4/chat/completions?api-version=${AV}`,{
      method:'POST',headers:{'Content-Type':'application/json','api-key':AK},
      body:JSON.stringify({messages:[
        {role:'system',content:'Given a physical appearance trait, return JSON with "trait" (cleaned title case 2-4 words) and "region" (one of: head,face,mouth,shoulders,chest,arms,abs,hips,legs,feet,full). Return ONLY JSON.'},
        {role:'user',content:txt}
      ],max_completion_tokens:200,temperature:0.2})
    });
    if(!r.ok)throw new Error(r.status);
    const d=await r.json(),c=d.choices?.[0]?.message?.content||'';
    const p=JSON.parse(c.replace(/```json\s*/g,'').replace(/```/g,'').trim());
    inp.value='';
    addTrait(p.trait||txt,null,p.region||'full');
  }catch(e){console.error(e);showErr()}
  finally{busy=false;btn.disabled=false;btn.classList.remove('loading')}
}

function showErr(){const inp=document.getElementById('inp');inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),500)}

function addTrait(trait,detail,region){
  const slot=findSlot(region);
  fillSlot(slot,trait,detail);
  traits.push({trait,detail:detail||'',region,slot});
  sndDing();updateProgress();checkMS(traits.length);
}

function updateProgress(){
  const el=document.getElementById('pCount');
  el.textContent=traits.length;
  const wrap=document.getElementById('pNum');
  wrap.classList.remove('bo');void wrap.offsetWidth;
  if(traits.length)wrap.classList.add('bo');
  const hints=['Let\'s find some amazing traits!','Great start! Keep going!','You\'re on a roll!','Impressive collection!','Wow, so many!'];
  document.getElementById('pHint').textContent=hints[Math.min(Math.floor(traits.length/3),hints.length-1)];
}

/* SMILE ZOOM */
function showSmileZoom(){
  sndPop();
  const inner=document.getElementById('zoomInner');
  const variations=[
    {label:'Bright White Teeth',img:'images/smile_1.png'},
    {label:'Wide Happy Grin',img:'images/smile_2.png'},
    {label:'Gentle Soft Smile',img:'images/smile_3.png'}
  ];
  inner.innerHTML=`
    <div class="zq">What do you mean by <span>Nice Smile</span>?</div>
    <div class="zimages" id="zimages"></div>
    <div style="margin-top:16px;opacity:0;animation:su .4s .8s ease-out forwards">
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Or describe it yourself</div>
      <div style="display:flex;gap:8px;max-width:340px;margin:0 auto">
        <input id="smileCustom" placeholder="Type your own..." style="flex:1;padding:10px 14px;border:2px solid var(--dash);border-radius:12px;font-family:Nunito;font-size:13px;color:var(--navy);outline:none" onkeydown="if(event.key==='Enter'){event.preventDefault();smileCustomSubmit()}" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--dash)'"/>
        <button onclick="smileCustomSubmit()" style="padding:10px 16px;background:var(--teal);color:#fff;border:none;border-radius:12px;font-family:Fredoka;font-size:13px;font-weight:600;cursor:pointer">Add</button>
      </div>
    </div>`;
  const container=document.getElementById('zimages');
  variations.forEach((v,i)=>{
    const card=document.createElement('div');
    card.className='zimg-card';
    card.style.animation=`su 0.5s ${0.3+i*0.15}s ease-out forwards`;
    card.innerHTML=`<img src="${v.img}" alt="${v.label}"><div class="zimg-label">${v.label}</div>`;
    card.onclick=()=>{sndSelect();addTrait('Nice Smile',v.label,'mouth');closeZoom()};
    container.appendChild(card);
  });
  document.getElementById('zoomOverlay').classList.add('active');
}
function smileCustomSubmit(){const inp=document.getElementById('smileCustom'),val=inp?.value.trim();if(!val)return;sndSelect();addTrait('Nice Smile',val,'mouth');closeZoom()}
function closeZoom(){document.getElementById('zoomOverlay').classList.remove('active')}

/* HOTSPOTS */
let activeHS=null;
document.querySelectorAll('.ov-hs').forEach(hs=>{
  hs.addEventListener('click',e=>{
    e.stopPropagation();sndClick();
    const region=hs.dataset.region,label=hs.dataset.label;
    const popup=document.getElementById('hsPopup'),input=document.getElementById('hsInput');
    document.getElementById('hsRegionLabel').textContent=label;
    activeHS=region;
    const canvasRect=document.getElementById('gameCanvas').getBoundingClientRect();
    const bbox=hs.getBoundingClientRect();
    const px=bbox.left+bbox.width/2-canvasRect.left,py=bbox.top+bbox.height/2-canvasRect.top;
    popup.style.left=Math.min(px+20,canvasRect.width-240)+'px';
    popup.style.top=Math.max(py-30,10)+'px';
    popup.classList.add('active');input.value='';
    setTimeout(()=>input.focus(),100);
  });
  hs.addEventListener('mouseenter',e=>{
    const lbl=document.getElementById('hsLabel'),canvasRect=document.getElementById('gameCanvas').getBoundingClientRect(),bbox=hs.getBoundingClientRect();
    lbl.textContent=hs.dataset.label;
    lbl.style.left=(bbox.left+bbox.width/2-canvasRect.left)+'px';
    lbl.style.top=(bbox.top-canvasRect.top-22)+'px';
    lbl.style.opacity='1';
  });
  hs.addEventListener('mouseleave',()=>{document.getElementById('hsLabel').style.opacity='0'});
});

function hsSubmit(){
  const inp=document.getElementById('hsInput'),txt=inp.value.trim();
  if(!txt)return;
  if(IDK_RE.test(txt)){closeHsPopup();showIDK();return}
  sndSelect();addTrait(txt,null,activeHS||'full');closeHsPopup();
}
function closeHsPopup(){document.getElementById('hsPopup').classList.remove('active');activeHS=null}
document.getElementById('gameCanvas').addEventListener('click',e=>{
  if(!e.target.closest('.ov-hs')&&!e.target.closest('#hsPopup'))closeHsPopup();
});

/* IDK */
function showIDK(){sndErr();document.getElementById('idkOverlay').classList.add('active');const inp=document.getElementById('inp');inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),500);setTimeout(()=>document.getElementById('idkOverlay').classList.remove('active'),1800)}

/* DONE */
function showDone(){
  sndCeleb();burst(innerWidth/2,innerHeight/3,120);
  const c=document.getElementById('doneContent');
  let h='';traits.forEach(t=>{h+=`<div class="done-trait"><div>${t.trait}</div>${t.detail?`<div class="sub">${t.detail}</div>`:''}</div>`});
  c.innerHTML=`<div class="done-emoji">🎉</div><div class="done-title">Great Job!</div><div class="done-count">${traits.length}</div><div class="done-label">appearance ideals identified</div>${h?`<div class="done-traits">${h}</div>`:'<div class="done-label" style="color:var(--coral)">No traits yet!</div>'}<button class="done-back" onclick="closeDone()">Back to Activity</button>`;
  document.getElementById('doneOverlay').classList.add('active');
}
function closeDone(){document.getElementById('doneOverlay').classList.remove('active')}
function clearAll(){traits=[];slotData.fill(null);renderSlots();updateProgress();sndPop()}

setTimeout(()=>document.querySelectorAll('.ideco').forEach((d,i)=>{d.style.animationDelay=(.3+i*.12)+'s';d.classList.add('on')}),100);
</script>
