<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appearance Ideals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3D6F;
  --navy-light:#2A5298;
  --green:#3EA66B;
  --green-light:#48C278;
  --green-dim:rgba(62,166,107,0.12);
  --green-line:rgba(62,166,107,0.55);
  --green-dot:rgba(62,166,107,0.85);
  --bg:#FFFFFF;
  --border-dash:#B8C9DD;
  --text:#1B3D6F;
  --text-dim:#5A7A9E;
  --text-muted:#8FA4BC;
  --input-bg:#F5F8FC;
}
html,body{height:100%;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* Page */
.page{display:flex;flex-direction:column;height:100vh;max-width:1400px;margin:0 auto;border-left:3px dashed var(--border-dash);border-right:3px dashed var(--border-dash)}

/* Header */
.header{
  padding:28px 40px 16px;
  display:flex;align-items:center;gap:16px;
  border-bottom:3px dashed var(--border-dash);
  flex-shrink:0;
}
.chevrons{display:flex;gap:4px;flex-shrink:0}
.chevron{
  width:0;height:0;
  border-top:14px solid transparent;
  border-bottom:14px solid transparent;
  border-left:16px solid var(--navy);
}
.header h1{
  font-size:32px;font-weight:800;color:var(--navy);
  letter-spacing:-0.5px;line-height:1.1;
}

/* Instruction box */
.instruction-box{
  margin:16px 40px;
  padding:16px 22px;
  border:2.5px dashed var(--navy);
  border-radius:6px;
  flex-shrink:0;
}
.instruction-box p{font-size:14px;line-height:1.6;color:var(--navy);font-weight:400}
.instruction-box p strong{font-weight:700}

/* Workspace */
.workspace{flex:1;display:flex;padding:8px 20px 20px;min-height:0;gap:12px}

/* Figure area */
.figure-area{flex:1;position:relative;overflow:hidden}
#bodySvg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  height:90%;max-height:520px;
}
#lineSvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}
#labelsContainer{position:absolute;inset:0;pointer-events:none;z-index:3}

/* Annotation labels */
.label-tag{
  position:absolute;pointer-events:auto;
  padding:4px 0;
  font-size:13px;font-weight:600;
  color:var(--navy);
  white-space:nowrap;
  border-bottom:2.5px solid var(--green);
  opacity:0;
  transition:opacity 0.4s ease;
}
.label-tag.visible{opacity:1}
.label-tag.left-side{text-align:right}
.label-tag.right-side{text-align:left}

/* Input panel */
.input-panel{
  width:280px;flex-shrink:0;
  display:flex;flex-direction:column;gap:10px;
  padding:8px 0;
  border-left:2px dashed var(--border-dash);
  padding-left:20px;
}
.input-panel h2{font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.5px}
.input-panel textarea{
  width:100%;min-height:80px;padding:12px 14px;
  background:var(--input-bg);border:2px solid var(--border-dash);border-radius:8px;
  color:var(--navy);font-family:'Poppins',sans-serif;font-size:13px;line-height:1.5;
  resize:vertical;outline:none;transition:border-color 0.2s;
}
.input-panel textarea:focus{border-color:var(--navy)}
.input-panel textarea::placeholder{color:var(--text-muted)}

.btn-primary{
  width:100%;padding:11px;
  background:var(--green);color:#fff;
  border:none;border-radius:8px;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:'Poppins',sans-serif;transition:all 0.2s;
  text-transform:uppercase;letter-spacing:0.5px;
}
.btn-primary:hover{background:var(--green-light)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary.loading{background:var(--input-bg);border:2px solid var(--border-dash);color:var(--text-muted)}

.btn-secondary{
  width:100%;padding:8px;
  background:none;border:2px solid var(--border-dash);border-radius:8px;
  color:var(--text-dim);font-size:11px;font-weight:600;cursor:pointer;
  font-family:'Poppins',sans-serif;transition:all 0.2s;
}
.btn-secondary:hover{border-color:var(--navy);color:var(--navy)}

.annot-count{font-size:11px;color:var(--text-muted);text-align:center;padding:2px;font-weight:500}
.error-msg{font-size:11px;color:#D32F2F;padding:4px 0;display:none;font-weight:500}
.error-msg.show{display:block}

/* Example chips */
.examples{margin-top:auto;padding-top:12px;border-top:2px dashed var(--border-dash)}
.examples h3{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.example-chip{
  display:inline-block;padding:4px 10px;margin:2px;
  background:var(--input-bg);border:1.5px solid var(--border-dash);border-radius:14px;
  font-size:11px;font-weight:500;color:var(--text-dim);cursor:pointer;transition:all 0.2s;
}
.example-chip:hover{border-color:var(--green);color:var(--green)}

/* Animations */
@keyframes dotPulse{
  0%,100%{r:4;opacity:0.85}
  50%{r:6;opacity:1}
}
.dot-new{animation:dotPulse 0.6s ease-out}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="chevrons">
      <div class="chevron"></div>
      <div class="chevron"></div>
    </div>
    <h1>Appearance Ideals</h1>
  </div>

  <div class="instruction-box">
    <p>Label the body below with as many features as you can that make up today's appearance ideals.<br>
    <strong>What are appearance ideals for males?</strong></p>
  </div>

  <div class="workspace">
    <div class="figure-area" id="figureArea">

      <!-- Simple pictogram human figure (bathroom-sign style) -->
      <svg id="bodySvg" viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg">
        <g fill="#1B3D6F">
          <!-- Head -->
          <circle cx="100" cy="36" r="28"/>
          <!-- Body / torso -->
          <rect x="66" y="70" width="68" height="128" rx="10"/>
          <!-- Left arm -->
          <rect x="18" y="80" width="52" height="26" rx="13"/>
          <!-- Right arm -->
          <rect x="130" y="80" width="52" height="26" rx="13"/>
          <!-- Left leg -->
          <rect x="62" y="202" width="30" height="138" rx="14"/>
          <!-- Right leg -->
          <rect x="108" y="202" width="30" height="138" rx="14"/>
        </g>
      </svg>

      <!-- Line overlay -->
      <svg id="lineSvg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="var(--green-line)"/>
          </marker>
        </defs>
      </svg>

      <!-- Label elements -->
      <div id="labelsContainer"></div>
    </div>

    <div class="input-panel">
      <h2>Add traits</h2>
      <textarea id="userInput" placeholder="e.g., long hair, blue eyes, muscular build..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addAnnotation()}"></textarea>
      <button class="btn-primary" id="btnAdd" onclick="addAnnotation()">Add to Figure</button>
      <button class="btn-secondary" onclick="clearAll()">Clear All</button>
      <div class="annot-count" id="annotCount"></div>
      <div class="error-msg" id="errorMsg"></div>

      <div class="examples">
        <h3>Try these</h3>
        <span class="example-chip" onclick="tryExample(this)">tall stature</span>
        <span class="example-chip" onclick="tryExample(this)">broad shoulders</span>
        <span class="example-chip" onclick="tryExample(this)">defined jawline</span>
        <span class="example-chip" onclick="tryExample(this)">muscular arms</span>
        <span class="example-chip" onclick="tryExample(this)">six-pack abs</span>
        <span class="example-chip" onclick="tryExample(this)">thick hair</span>
        <span class="example-chip" onclick="tryExample(this)">strong legs</span>
        <span class="example-chip" onclick="tryExample(this)">clear skin</span>
      </div>
    </div>
  </div>
</div>

<script>
const AZURE_ENDPOINT = 'https://nesoi-resource.openai.azure.com';
const AZURE_API_KEY = '89bry3528qMUbZnFK77ExyBjS7W02IbOFj35UwU6yjKTE0yiJRMCJQQJ99CCACHYHv6XJ3w3AAAAACOGJj4V';
const AZURE_API_VERSION = '2025-04-01-preview';
const DEPLOYMENT = 'gpt-5.4';

let annotations = [];
let processing = false;

/* Body coordinate map matching the pictogram SVG (viewBox 0 0 200 420) */
const BODY_MAP = `BODY REGION COORDINATE MAP (SVG viewBox: 0 0 200 420, origin = top-left):

HEAD & FACE:
- Top of head / crown / hair: (100, 10)
- Forehead: (100, 22)
- Left eye: (88, 32), Right eye: (112, 32)
- Nose: (100, 38)
- Mouth / lips / smile / teeth: (100, 44)
- Chin: (100, 52)
- Left ear: (72, 35), Right ear: (128, 35)
- Left jawline: (78, 48), Right jawline: (122, 48)
- Facial hair / beard: (100, 50)

UPPER BODY:
- Neck: (100, 64)
- Left shoulder: (44, 88), Right shoulder: (156, 88)
- Upper chest: (100, 90)
- Left pectoral: (80, 100), Right pectoral: (120, 100)
- Left arm / bicep: (32, 92), Right arm / bicep: (168, 92)
- Upper abs: (100, 118)
- Core / midsection: (100, 138)
- Lower abs / six-pack: (100, 155)
- Waist: (100, 170)
- Navel: (100, 152)
- Left oblique / side: (72, 148), Right oblique: (128, 148)

LOWER BODY:
- Left hip: (76, 200), Right hip: (124, 200)
- Groin / pelvis: (100, 206)
- Left thigh: (77, 245), Right thigh: (123, 245)
- Left knee: (77, 280), Right knee: (123, 280)
- Left shin / calf: (77, 310), Right shin / calf: (123, 310)
- Left ankle: (77, 335), Right ankle: (123, 335)
- Left foot: (77, 340), Right foot: (123, 340)

GENERAL / WHOLE-BODY:
- Overall height / stature: (100, 210)
- Posture: (100, 160)
- Overall build / physique: (100, 135)
- Skin (general): (100, 128)
- Body hair (torso): (100, 130)`;

const SYSTEM_PROMPT = `You annotate a front-facing male human pictogram for an educational tool about appearance ideals.

Given user text describing physical traits, extract each distinct trait and map it to the correct body region. Return precise SVG coordinates for placing annotation arrows.

The figure uses an SVG coordinate system (viewBox 0 0 200 420):
${BODY_MAP}

EXISTING ANNOTATIONS ON THE FIGURE (avoid placing new labels at the same target positions):
{{EXISTING}}

Return ONLY valid JSON. No markdown fences, no explanation.

{
  "annotations": [
    {
      "text": "concise label (2-4 words)",
      "targetX": 100,
      "targetY": 38,
      "side": "left"
    }
  ]
}

RULES:
- Extract EVERY distinct trait as a separate annotation
- "long hair and blue eyes" = 2 separate annotations
- Keep label text SHORT (2-4 words). Use title case.
- Choose the most anatomically accurate target point from the coordinate map
- Alternate sides for visual balance. Check existing annotations and try to balance left vs right count.
- If a trait refers to paired body parts (eyes, arms, legs), pick ONE side
- For general traits (height, build, skin), use center coordinates
- Return 1-5 annotations per input
- targetX must be 0-200, targetY must be 0-420
- Do NOT place two annotations at the exact same target coordinates. Offset slightly if needed.`;

function existingText() {
  if (!annotations.length) return 'None yet.';
  return annotations.map(a => `- "${a.text}" at (${a.targetX}, ${a.targetY}) on ${a.side}`).join('\n');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

async function addAnnotation() {
  if (processing) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  processing = true;
  const btn = document.getElementById('btnAdd');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = 'Thinking...';

  try {
    const prompt = SYSTEM_PROMPT.replace('{{EXISTING}}', existingText());
    const url = `${AZURE_ENDPOINT}/openai/deployments/${DEPLOYMENT}/chat/completions?api-version=${AZURE_API_VERSION}`;

    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'api-key': AZURE_API_KEY },
      body: JSON.stringify({
        messages: [
          { role: 'system', content: prompt },
          { role: 'user', content: text }
        ],
        max_completion_tokens: 1024,
        temperature: 0.2
      })
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`API ${resp.status}: ${errText.slice(0, 200)}`);
    }

    const data = await resp.json();
    const content = data.choices?.[0]?.message?.content || '';
    const cleaned = content.replace(/```json\s*/g, '').replace(/```/g, '').trim();
    const parsed = JSON.parse(cleaned);

    if (parsed.annotations && parsed.annotations.length > 0) {
      const newIndices = [];
      for (const ann of parsed.annotations) {
        const idx = annotations.length;
        annotations.push({
          text: String(ann.text || '').slice(0, 40),
          targetX: Math.max(0, Math.min(200, Number(ann.targetX) || 100)),
          targetY: Math.max(0, Math.min(420, Number(ann.targetY) || 210)),
          side: ann.side === 'left' ? 'left' : 'right'
        });
        newIndices.push(idx);
      }
      renderAll(newIndices);
      input.value = '';
    } else {
      showError('No annotations returned. Try a different description.');
    }
  } catch (err) {
    console.error('Annotation error:', err);
    showError('Something went wrong. Please try again.');
  } finally {
    processing = false;
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = 'Add to Figure';
  }
}

function renderAll(newIndices) {
  const area = document.getElementById('figureArea');
  const body = document.getElementById('bodySvg');
  const lineSvg = document.getElementById('lineSvg');
  const container = document.getElementById('labelsContainer');

  container.innerHTML = '';
  while (lineSvg.children.length > 1) lineSvg.removeChild(lineSvg.lastChild);

  if (!annotations.length) {
    document.getElementById('annotCount').textContent = '';
    return;
  }

  const aRect = area.getBoundingClientRect();
  const bRect = body.getBoundingClientRect();

  const bLeft = bRect.left - aRect.left;
  const bTop = bRect.top - aRect.top;
  const bW = bRect.width;
  const bH = bRect.height;
  const sx = bW / 200;
  const sy = bH / 420;

  lineSvg.setAttribute('viewBox', `0 0 ${aRect.width} ${aRect.height}`);

  const total = annotations.length;
  const fontSize = Math.max(9, Math.min(13, 13 - Math.max(0, total - 8) * 0.35));
  const padV = Math.max(2, Math.min(4, 4 - Math.max(0, total - 12) * 0.2));
  const itemH = fontSize + padV * 2 + 5;
  const margin = 14;

  const leftAnns = [];
  const rightAnns = [];
  annotations.forEach((a, i) => {
    const entry = { ...a, idx: i };
    if (a.side === 'left') leftAnns.push(entry);
    else rightAnns.push(entry);
  });
  leftAnns.sort((a, b) => a.targetY - b.targetY);
  rightAnns.sort((a, b) => a.targetY - b.targetY);

  function layoutSide(anns, side) {
    const count = anns.length;
    if (!count) return;
    const availH = aRect.height - 20;
    const gap = Math.max(1, Math.min(8, (availH - count * itemH) / Math.max(count, 1)));
    const totalH = count * itemH + (count - 1) * gap;
    const startY = Math.max(10, (aRect.height - totalH) / 2);

    anns.forEach((ann, i) => {
      const label = document.createElement('div');
      label.className = 'label-tag ' + (side === 'left' ? 'left-side' : 'right-side');
      label.textContent = ann.text;
      label.dataset.idx = ann.idx;
      label.style.fontSize = fontSize + 'px';
      label.style.padding = `${padV}px 0`;
      label.style.top = (startY + i * (itemH + gap)) + 'px';

      if (side === 'left') {
        const rightPos = aRect.width - bLeft + margin;
        label.style.right = rightPos + 'px';
      } else {
        label.style.left = (bLeft + bW + margin) + 'px';
      }

      container.appendChild(label);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          label.classList.add('visible');
        });
      });
    });
  }

  layoutSide(leftAnns, 'left');
  layoutSide(rightAnns, 'right');

  requestAnimationFrame(() => {
    container.querySelectorAll('.label-tag').forEach(label => {
      const idx = parseInt(label.dataset.idx);
      const ann = annotations[idx];
      if (!ann) return;

      const lRect = label.getBoundingClientRect();
      const lCenterY = lRect.top - aRect.top + lRect.height / 2;
      let lEdgeX;
      if (ann.side === 'left') {
        lEdgeX = lRect.right - aRect.left + 6;
      } else {
        lEdgeX = lRect.left - aRect.left - 6;
      }

      const tX = bLeft + ann.targetX * sx;
      const tY = bTop + ann.targetY * sy;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', lEdgeX);
      line.setAttribute('y1', lCenterY);
      line.setAttribute('x2', tX);
      line.setAttribute('y2', tY);
      line.setAttribute('stroke', 'var(--green-line)');
      line.setAttribute('stroke-width', '1.5');
      line.setAttribute('marker-end', 'url(#arrowhead)');
      lineSvg.appendChild(line);

      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', tX);
      dot.setAttribute('cy', tY);
      dot.setAttribute('r', '4');
      dot.setAttribute('fill', 'var(--green-dot)');
      if (newIndices && newIndices.includes(idx)) {
        dot.classList.add('dot-new');
      }
      lineSvg.appendChild(dot);
    });
  });

  document.getElementById('annotCount').textContent =
    `${total} annotation${total !== 1 ? 's' : ''}`;
}

function clearAll() {
  annotations = [];
  renderAll([]);
}

function tryExample(el) {
  document.getElementById('userInput').value = el.textContent;
  addAnnotation();
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (annotations.length) renderAll(null);
  }, 250);
});
</script>
</body>
</html>
